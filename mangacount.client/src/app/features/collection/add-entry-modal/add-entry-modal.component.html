<div class="modal-overlay" *ngIf="isOpen" (click)="onClose()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ editingEntry ? 'Editar Entrada' : 'Agregar Entrada' }}</h2>
      <button class="close-btn" (click)="onClose()">✕</button>
    </div>

    <form (ngSubmit)="onSubmit()" class="modal-body">
      <div class="form-group">
        <label for="manga">Manga:</label>
        <select 
          id="manga" 
          [value]="entry.mangaId" 
          (change)="onMangaSelect($any($event.target).value)"
          class="form-control">
          <option value="0">-- Crear nuevo manga --</option>
          <option *ngFor="let manga of mangas" [value]="manga.id">
            {{ manga.name }}
          </option>
        </select>
      </div>

      <div class="form-group" *ngIf="isCreatingNewManga">
        <label for="mangaName">Nombre del nuevo manga:</label>
        <input 
          type="text" 
          id="mangaName"
          [(ngModel)]="selectedMangaName"
          name="mangaName"
          class="form-control"
          placeholder="Ingresa el nombre del manga">
      </div>

      <div class="form-group">
        <label for="quantity">Cantidad de volúmenes:</label>
        <input 
          type="number" 
          id="quantity"
          [(ngModel)]="entry.quantity"
          name="quantity"
          min="0"
          class="form-control">
      </div>

      <div class="form-group">
        <label for="pending">Volúmenes pendientes (opcional):</label>
        <input 
          type="text" 
          id="pending"
          [(ngModel)]="entry.pending"
          name="pending"
          class="form-control"
          placeholder="ej. Volúmenes 5-10">
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input 
            type="checkbox" 
            [(ngModel)]="entry.priority"
            name="priority">
          <span class="checkmark"></span>
          Marcar como prioritario
        </label>
      </div>

      <div class="form-actions">
        <button 
          type="submit" 
          class="save-btn"
          [disabled]="(!entry.mangaId && !selectedMangaName.trim())">
          {{ editingEntry ? 'Actualizar' : 'Guardar' }}
        </button>
        <button type="button" (click)="onClose()" class="cancel-btn">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
